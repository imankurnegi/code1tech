name: Build & Deploy React + Vite SSR to code1new/frontend

on:
  push:
    branches:
      - main
  repository_dispatch:
    types: [wp-content-updated]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # 4️⃣ Build React SSR
      - name: Build React SSR
        run: npm run build

      # 5️⃣ Setup SSH for SFTP
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SFTP_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SFTP_HOST }} >> ~/.ssh/known_hosts

      # 6️⃣ Deploy files via SFTP
      - name: Deploy dist and server-prod.js via SFTP
        run: |
          # Create remote directories if they don't exist
          ssh ${{ secrets.SFTP_USER }}@${{ secrets.SFTP_HOST }} "mkdir -p /home/pm36sc96i3w0/code1new/frontend/dist/client /home/pm36sc96i3w0/code1new/frontend/dist/server"

          # Upload client dist
          rsync -avz --delete dist/client/ \
            ${{ secrets.SFTP_USER }}@${{ secrets.SFTP_HOST }}:/home/pm36sc96i3w0/code1new/frontend/dist/client

          # Upload server dist
          rsync -avz --delete dist/server/ \
            ${{ secrets.SFTP_USER }}@${{ secrets.SFTP_HOST }}:/home/pm36sc96i3w0/code1new/frontend/dist/server

          # Upload server-prod.js
          rsync -avz server-prod.js \
            ${{ secrets.SFTP_USER }}@${{ secrets.SFTP_HOST }}:/home/pm36sc96i3w0/code1new/frontend/server-prod.js

          # Upload .htaccess
          rsync -avz .htaccess \
            ${{ secrets.SFTP_USER }}@${{ secrets.SFTP_HOST }}:/home/pm36sc96i3w0/code1new/frontend/.htaccess

      # 7️⃣ Info / Reminder
      - name: Final Info
        run: |
          echo "✅ Deployment complete. Files uploaded to /code1new/frontend/"
          echo "⚠️ Remember: Start Node.js app via Hostinger / GoDaddy Node.js panel:"
          echo "   node server-prod.js"
          echo "Port will be assigned by panel automatically."