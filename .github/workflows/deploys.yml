name: Deploy React SSR to Code1tech Frontend (SFTP)

on:
  push:
    branches:
      - main
  repository_dispatch:
    types: [wp-content-updated]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # 4️⃣ Build SSR (client + server)
      - name: Build SSR
        run: npm run build

      # 5️⃣ Setup SSH
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SFTP_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SFTP_HOST }} >> ~/.ssh/known_hosts

      # 6️⃣ Deploy SSR files via SFTP
      - name: Deploy SSR files
        run: |
          # Create remote directories if missing
          ssh ${{ secrets.SFTP_USER }}@${{ secrets.SFTP_HOST }} "mkdir -p /home/pm36sc96i3w0/public_html/code1new/frontend/dist/client /home/pm36sc96i3w0/public_html/code1new/frontend/dist/server"

          # Upload client dist
          rsync -avz --delete dist/client/ \
            ${{ secrets.SFTP_USER }}@${{ secrets.SFTP_HOST }}:/home/pm36sc96i3w0/public_html/code1new/frontend/dist/client

          # Upload server dist
          rsync -avz --delete dist/server/ \
            ${{ secrets.SFTP_USER }}@${{ secrets.SFTP_HOST }}:/home/pm36sc96i3w0/public_html/code1new/frontend/dist/server

          # Upload server-prod.js
          rsync -avz server-prod.js \
            ${{ secrets.SFTP_USER }}@${{ secrets.SFTP_HOST }}:/home/pm36sc96i3w0/public_html/code1new/frontend/server-prod.js

      # 7️⃣ Start Node.js server in background (auto)
      - name: Start Node.js server
        run: |
          ssh ${{ secrets.SFTP_USER }}@${{ secrets.SFTP_HOST }} \
          "cd /home/pm36sc96i3w0/public_html/code1new/frontend && nohup node server-prod.js > server.log 2>&1 &"

      # 8️⃣ Deployment Info
      - name: Deployment Info
        run: |
          echo "✅ SSR Deployment complete. Files uploaded to /code1new/frontend/"
          echo "📄 Node.js server started in background (logs: server.log)"