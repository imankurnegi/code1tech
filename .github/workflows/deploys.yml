name: Deploy React to Code1tech Frontend (FTP)

on:
  push:
    branches:
      - main
      
  repository_dispatch:
    types: [wp-content-updated]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
      
      - name: Start local proxy
        run: node proxy.js &

      - name: Build React SSG
        run: npm run build:prod

      - name: Deploy via FTP to Code1tech Frontend
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: dist/
#          local-dir: ./
          server-dir: ${{ secrets.FTP_PATH }}/