name: Deploy React SSG to Code1tech Frontend (SFTP)

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Code checkout
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Node setup
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # 3️⃣ Install deps
      - name: Install dependencies
        run: npm install

      # 4️⃣ Start proxy (agar required ho)
      - name: Start local proxy
        run: node proxy.js &

      # 5️⃣ Build React SSG
      - name: Build React SSG
        run: npm run build:ssg

      # 6️⃣ Deploy via SFTP (PRIVATE KEY)
      - name: Deploy to server via SFTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          protocol: sftp
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USER }}
          port: 22
          private-key: ${{ secrets.SFTP_PRIVATE_KEY }}
          local-dir: dist/
          server-dir: /home/pm36sc96i3w0/public_html/code1new/frontend/