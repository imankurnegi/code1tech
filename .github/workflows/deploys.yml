name: Deploy React SSR to VPS

on:
  push:
    branches:
      - staging
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3️⃣ Install dependencies for build
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # 4️⃣ Build SSR (client + server)
      - name: Build SSR
        run: npm run build:ssr

      # 4.1️⃣ List output (optional, debug)
      - name: List build output
        run: ls -R dist

      # 5️⃣ Setup SSH key for VPS
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      # 6️⃣ Deploy built SSR files
      - name: Deploy SSR files
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "mkdir -p /var/www/frontend/dist/client /var/www/frontend/dist/server"

          rsync -avz --delete ./dist/client/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/frontend/dist/client

          rsync -avz --delete ./dist/server/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/frontend/dist/server

          rsync -avz server.js \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/frontend/server.js

      # 7️⃣ Restart PM2 server in production mode
      - name: Restart PM2 server
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "\
            cd /var/www/frontend && \
            NODE_ENV=production pm2 describe react-ssr > /dev/null 2>&1 && \
            NODE_ENV=production pm2 restart react-ssr --update-env || \
            NODE_ENV=production pm2 start server.js --name react-ssr --watch --update-env \
          "

      # 8️⃣ Deployment Info
      - name: Deployment Info
        run: |
          echo "✅ SSR Deployment complete. Files uploaded to /var/www/frontend/"
          echo "📄 PM2 process 'react-ssr' is running on VPS in production mode"