name: Deploy React SSG to Code1tech Frontend (SFTP)

on:
  push:
    branches:
      - main

  repository_dispatch:
    types: [wp-content-updated]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Node
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
      
       # 3️⃣ Cache node_modules
      - name: Cache node modules
        id: cache-node
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      # 3️⃣ Install deps
      - name: Install dependencies
        if: steps.cache-node.outputs.cache-hit != 'true'
        run: npm install

      # 5️⃣ Build
      - name: Build React SSG
        run: npm run build:ssg

      # 6️⃣ Setup SSH key
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SFTP_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SFTP_HOST }} >> ~/.ssh/known_hosts

      # 7️⃣ Deploy via rsync (KEY BASED)
      - name: Deploy via SFTP (rsync)
        run: |
          rsync -avz --delete \
          dist/ \
          ${{ secrets.SFTP_USER }}@${{ secrets.SFTP_HOST }}:/home/pm36sc96i3w0/public_html/code1new/frontend