name: Deploy React SSR to VPS

on:
  push:
    branches:
      - staging
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3️⃣ Install dependencies (for build only)
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # 4️⃣ Build SSR (client + server)
      - name: Build SSR
        run: npm run build:ssr

      # 4.1️⃣ List output (debug)
      - name: List build output
        run: ls -R dist

      # 5️⃣ Setup SSH key for VPS
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      # 6️⃣ Deploy SSR files via rsync
      - name: Deploy SSR files
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "mkdir -p /var/www/frontend/dist/client /var/www/frontend/dist/server"

          # Upload built client and server
          rsync -avz --delete ./dist/client/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/frontend/dist/client

          rsync -avz --delete ./dist/server/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/frontend/dist/server

          # Upload server entry file
          rsync -avz server.js \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/frontend/server.js

          # Upload package.json + lockfile (for production deps)
          rsync -avz package.json package-lock.json \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/frontend/

      # 7️⃣ Install production deps + Restart PM2 with NODE_ENV=production
      - name: Restart PM2 server
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "\
            cd /var/www/frontend && \
            npm install --omit=dev --legacy-peer-deps && \
            pm2 describe react-ssr > /dev/null 2>&1 && \
            pm2 restart react-ssr --update-env || pm2 start server.js --name react-ssr --watch --update-env \
          "

      # 8️⃣ Deployment Info
      - name: Deployment Info
        run: |
          echo "✅ SSR Deployment complete. Files uploaded to /var/www/frontend/"
          echo "📄 PM2 process 'react-ssr' is running on VPS with NODE_ENV=production"