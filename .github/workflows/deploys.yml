name: Build & Deploy React + Vite SSR to code1new/frontend

on:
  push:
    branches:
      - main
  repository_dispatch:
    types: [wp-content-updated]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # 4️⃣ Build React SSR
      - name: Build React SSR
        run: npm run build

      # 5️⃣ Ensure .htaccess exists (SPA fallback)
      - name: Ensure .htaccess exists
        run: |
          if [ ! -f .htaccess ]; then
            cat <<'EOF' > .htaccess
<IfModule mod_rewrite.c>
  RewriteEngine On
  RewriteBase /code1new/frontend/
  RewriteRule ^index\.html$ - [L]
  RewriteCond %{REQUEST_FILENAME} !-f
  RewriteCond %{REQUEST_FILENAME} !-d
  RewriteRule . /code1new/frontend/index.html [L]
</IfModule>
EOF
            echo ".htaccess file created."
          else
            echo ".htaccess already exists."
          fi

      # 6️⃣ Setup SSH for SFTP
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SFTP_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SFTP_HOST }} >> ~/.ssh/known_hosts

      # 7️⃣ Deploy files via SFTP
      - name: Deploy dist and server-prod.js via SFTP
        run: |
          ssh ${{ secrets.SFTP_USER }}@${{ secrets.SFTP_HOST }} "mkdir -p /home/pm36sc96i3w0/code1new/frontend/dist/client /home/pm36sc96i3w0/code1new/frontend/dist/server"

          # Upload client dist
          rsync -avz --delete dist/client/ \
            ${{ secrets.SFTP_USER }}@${{ secrets.SFTP_HOST }}:/home/pm36sc96i3w0/code1new/frontend/dist/client

          # Upload server dist
          rsync -avz --delete dist/server/ \
            ${{ secrets.SFTP_USER }}@${{ secrets.SFTP_HOST }}:/home/pm36sc96i3w0/code1new/frontend/dist/server

          # Upload server-prod.js
          rsync -avz server-prod.js \
            ${{ secrets.SFTP_USER }}@${{ secrets.SFTP_HOST }}:/home/pm36sc96i3w0/code1new/frontend/server-prod.js

          # Upload .htaccess
          rsync -avz .htaccess \
            ${{ secrets.SFTP_USER }}@${{ secrets.SFTP_HOST }}:/home/pm36sc96i3w0/code1new/frontend/.htaccess

      # 8️⃣ Deployment Info
      - name: Deployment Info
        run: |
          echo "✅ Deployment complete. Files uploaded to /code1new/frontend/"
          echo "⚠️ Start Node.js manually via Hostinger / GoDaddy Node.js panel:"
          echo "   node server-prod.js"