name: Deploy React SSG to Code1tech Frontend (SFTP)

on:
  push:
    branches:
      - main

  repository_dispatch:
    types: [wp-content-updated]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Setup Node (use LTS instead of hardcoding 20)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      # 3️⃣ Install deps
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # 4️⃣ Build
      - name: Build React SSG
        run: npm run build:ssg

      # 5️⃣ Setup SSH
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SFTP_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SFTP_HOST }} >> ~/.ssh/known_hosts

      # 6️⃣ Deploy via rsync
      - name: Deploy via SFTP (rsync)
        run: |
          rsync -avz --delete \
          dist/ \
          ${{ secrets.SFTP_USER }}@${{ secrets.SFTP_HOST }}:/home/pm36sc96i3w0/public_html/code1new/frontend